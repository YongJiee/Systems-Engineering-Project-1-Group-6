obstacle_range: 1.5 #2.5
raytrace_range: 3.5 #3.5
footprint: [[-0.16, -0.11], [-0.16, 0.11], [0.16, 0.11], [0.16, -0.11]]
inflation_radius: 0.2 #0.3
transform_tolerance: 0.13 #0.13

#observation_sources: scan
#scan:
#  data_type: LaserScan
#  topic: scan
#  marking: true
#  clearing: true
#  inf_is_valid: true

#map_type: costmap


map_type: costmap

# 👇 Use Voxel Layer instead of flat Obstacle Layer
plugins:
  - {name: obstacle_layer, type: "costmap_2d::VoxelLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

# 👇 Replace flat scan-only input with voxel settings
obstacle_layer:
  enabled: true
  max_obstacle_height: 2.0      # accommodate slope height
  obstacle_range: 1.5
  raytrace_range: 3.5
  track_unknown_space: true
  mark_threshold: 0
  unknown_threshold: 10
  combination_method: 1         # Max of layers
  origin_z: 0.0
  z_resolution: 0.05
  z_voxels: 16                  # finer 3D resolution
  publish_voxel_map: true      # visualize in RViz
  footprint_clearing_enabled: true
  observation_sources: scan
  scan:
    data_type: LaserScan
    topic: scan
    marking: true
    clearing: true
    inf_is_valid: true

