local_costmap:
  global_frame: odom         # Use odom for local map
  robot_base_frame: base_link
  update_frequency: 5.0
  publish_frequency: 2.0
  static_map: false
  rolling_window: true
  width: 2.0                 # Increased to allow lookahead on slope
  height: 2.0
  resolution: 0.05
  transform_tolerance: 0.3
  cost_scaling_factor: 2.58
  inflation_radius: 0.1      # Slightly more realistic safety buffer

  plugins:
    - {name: voxel_layer, type: "costmap_2d::VoxelLayer"}
    - {name: inflation, type: "costmap_2d::InflationLayer"}

voxel_layer:
  enabled: true
  max_obstacle_height: 2.0
  origin_z: 0.0
  z_resolution: 0.05
  z_voxels: 16
  publish_voxel_map: true
  obstacle_range: 2.5
  raytrace_range: 3.0
  track_unknown_space: true
  mark_threshold: 0
  unknown_threshold: 10
  combination_method: 1
  observation_sources: scan
  scan:
    data_type: LaserScan
    topic: scan
    marking: true
    clearing: true
    inf_is_valid: true

